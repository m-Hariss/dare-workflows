<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dare Workflow Runner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:      #EE183C;
      --blue:     #023572;
      --gradient: linear-gradient(92deg, #EE183C, #023572);
      --bg:       #F4F6FA;
      --surface:  #FFFFFF;
      --text:     #0a0a0a;
      --muted:    #737373;
      --border:   #e5e5e5;
      --radius:   10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--gradient);
      color: #fff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title { font-size: 1.05rem; font-weight: 700; letter-spacing: -.01em; }
    .header-subtitle { font-size: .75rem; opacity: .75; margin-top: 2px; }
    .btn-keys {
      padding: 7px 16px;
      font-size: .8rem;
      font-weight: 600;
      background: rgba(255,255,255,.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    .btn-keys:hover { background: rgba(255,255,255,.25); }

    /* ── Layout ── */
    .container {
      max-width: 980px;
      margin: 32px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }
    .card-body { padding: 18px; }

    /* ── Upload area ── */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--red);
      background: #fff5f6;
    }
    .upload-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .upload-label { font-size: .85rem; font-weight: 600; margin-bottom: 3px; }
    .upload-hint  { font-size: .73rem; color: var(--muted); }
    #file-input   { display: none; }

    .btn-row { display: flex; gap: 8px; margin-top: 14px; }

    .btn-danger {
      padding: 7px 14px;
      font-size: .8rem;
      font-weight: 600;
      background: transparent;
      color: var(--red);
      border: 1px solid #f9a8b4;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-danger:hover:not(:disabled) { background: #fff0f2; }
    .btn-danger:disabled { opacity: .4; cursor: not-allowed; }

    .status {
      margin-top: 12px;
      font-size: .78rem;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }
    .status.ok    { background: #dcfce7; color: #15803d; display: block; }
    .status.error { background: #fee2e2; color: var(--red); display: block; }

    /* ── Right panel ── */
    .right-panel { display: flex; flex-direction: column; gap: 16px; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: .85rem;
    }
    .empty-icon { font-size: 2.2rem; margin-bottom: 10px; }

    .wf-meta { margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .wf-title { font-size: .95rem; font-weight: 700; margin-bottom: 3px; }
    .wf-detail { font-size: .75rem; color: var(--muted); }

    .section-label {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* ── Node rows ── */
    .node-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      margin-bottom: 5px;
      font-size: .82rem;
    }
    .node-label { flex: 1; font-weight: 500; }
    .node-id { font-family: "SF Mono", ui-monospace, monospace; font-size: .68rem; color: var(--muted); }

    /* ── Badges ── */
    .badge {
      font-size: .62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .badge-start    { background: #dbeafe; color: #1d4ed8; }
    .badge-step     { background: #dcfce7; color: #15803d; }
    .badge-file     { background: #fef9c3; color: #a16207; }
    .badge-router   { background: #f3e8ff; color: #7c3aed; }
    .badge-output   { background: #f4f4f5; color: #52525b; }
    .badge-content  { background: #fef9c3; color: #a16207; }
    .badge-embed    { background: #f3e8ff; color: #7c3aed; }

    /* ── File slots ── */
    .slot-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      margin-bottom: 6px;
    }
    .slot-info { flex: 1; min-width: 0; }
    .slot-label { font-size: .82rem; font-weight: 600; margin-bottom: 3px; }
    .slot-file {
      font-size: .72rem;
      color: var(--muted);
      font-family: "SF Mono", ui-monospace, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .slot-file.uploaded { color: #15803d; }
    .slot-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .btn-upload {
      padding: 5px 11px;
      font-size: .75rem;
      font-weight: 600;
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-remove-slot {
      padding: 5px 9px;
      font-size: .75rem;
      font-weight: 600;
      background: transparent;
      color: var(--red);
      border: 1px solid #f9a8b4;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-remove-slot:hover { background: #fff0f2; }
    .idx-badge {
      font-size: .68rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .idx-done     { background: #dcfce7; color: #15803d; }
    .idx-progress { background: #fef9c3; color: #a16207; }
    .idx-fail     { background: #fee2e2; color: var(--red); cursor: help; }

    .key-warning {
      font-size: .8rem;
      background: #fef9c3;
      color: #a16207;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 12px;
    }

    .btn-remove-file {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: .75rem;
      padding: 0 0 0 4px;
      line-height: 1;
      vertical-align: middle;
    }
    .btn-remove-file:hover { color: var(--red); }

    .slot-prompt {
      font-size: .72rem;
      color: var(--muted);
      margin: 5px 0 6px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-style: italic;
    }

    /* ── Run button ── */
    .btn-run {
      width: 100%;
      padding: 10px 18px;
      font-size: .9rem;
      font-weight: 700;
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 14px;
      transition: opacity .15s;
    }
    .btn-run:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Run output panel ── */
    .run-status {
      font-size: .78rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
    }
    .run-status.running  { background: #fef9c3; color: #a16207; }
    .run-status.done     { background: #dcfce7; color: #15803d; }
    .run-status.failed   { background: #fee2e2; color: var(--red); }

    .node-output {
      border: 1px solid var(--border);
      border-radius: 7px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .node-output-header {
      padding: 7px 12px;
      background: #f9fafb;
      border-bottom: 1px solid var(--border);
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .node-output-instruction {
      padding: 4px 12px 5px;
      font-size: .75rem;
      color: var(--muted);
      font-style: italic;
      background: #fafafa;
      border-bottom: 1px solid var(--border);
    }
    .node-output-body {
      padding: 12px;
      font-size: .82rem;
      line-height: 1.6;
      word-break: break-word;
      max-height: 260px;
      overflow-y: auto;
    }

    .final-output-box {
      border: 2px solid #bbf7d0;
      border-radius: 8px;
      background: #f0fdf4;
      padding: 14px;
      margin-top: 6px;
      font-size: .85rem;
      line-height: 1.65;
      word-break: break-word;
      max-height: 400px;
      overflow-y: auto;
    }

    /* rendered markdown inside output boxes */
    .node-output-body h2, .node-output-body h3, .node-output-body h4,
    .final-output-box  h2, .final-output-box  h3, .final-output-box  h4 {
      margin: .9em 0 .3em;
      font-weight: 700;
      line-height: 1.3;
    }
    .node-output-body h2, .final-output-box h2 { font-size: 1.05em; }
    .node-output-body h3, .final-output-box h3 { font-size: .97em; }
    .node-output-body h4, .final-output-box h4 { font-size: .9em; color: var(--muted); }
    .node-output-body p,  .final-output-box  p  { margin: .4em 0; }
    .node-output-body ul, .node-output-body ol,
    .final-output-box  ul, .final-output-box  ol {
      margin: .4em 0 .4em 1.4em;
      padding: 0;
    }
    .node-output-body li, .final-output-box li { margin: .2em 0; }
    .node-output-body hr, .final-output-box hr  { border: none; border-top: 1px solid var(--border); margin: .8em 0; }
    .node-output-body strong, .final-output-box strong { font-weight: 700; }
    .node-output-body em,     .final-output-box em     { font-style: italic; }
    .node-output-body code,   .final-output-box code   {
      font-family: monospace;
      background: rgba(0,0,0,.06);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: .9em;
    }
    .final-output-label {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #15803d;
      margin-bottom: 8px;
    }

    /* ── Keys Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 12px;
      width: 100%;
      max-width: 520px;
      margin: 0 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: .95rem; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      padding: 2px 6px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 16px 20px; }

    .key-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .key-row:last-child { border-bottom: none; }
    .key-provider { width: 68px; font-size: .82rem; font-weight: 600; text-transform: capitalize; }
    .key-status {
      font-size: .72rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      width: 58px;
      text-align: center;
      flex-shrink: 0;
    }
    .key-status.set   { background: #dcfce7; color: #15803d; }
    .key-status.unset { background: #f4f4f5; color: var(--muted); }
    .key-input {
      flex: 1;
      padding: 6px 10px;
      font-size: .78rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: "SF Mono", ui-monospace, monospace;
      outline: none;
    }
    .key-input:focus { border-color: var(--red); }
    .btn-save-key {
      padding: 6px 11px;
      font-size: .75rem;
      font-weight: 600;
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
    }
    .btn-remove-key {
      padding: 6px 9px;
      font-size: .75rem;
      font-weight: 600;
      background: transparent;
      color: var(--red);
      border: 1px solid #f9a8b4;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
    }
    .btn-remove-key:hover { background: #fff0f2; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-title">Dare Workflow Runner</div>
      <div class="header-subtitle">Upload and run your Dare workflows locally</div>
    </div>
    <button class="btn-keys" onclick="openModal()">⚙ API Keys</button>
  </div>

  <!-- Main layout -->
  <div class="container">

    <!-- Left: Workflow upload -->
    <div class="card">
      <div class="card-header">Workflow</div>
      <div class="card-body">
        <div class="upload-area" id="upload-area">
          <div class="upload-icon">📂</div>
          <div class="upload-label">Drop your workflow JSON here</div>
          <div class="upload-hint">or click to browse</div>
          <input type="file" id="file-input" accept=".json,.dare" />
        </div>
        <div class="btn-row">
          <button class="btn-danger" id="clear-btn" disabled>Clear workflow</button>
        </div>
        <div class="status" id="status"></div>
      </div>
    </div>

    <!-- Right: Workflow info + file slots -->
    <div class="right-panel">

      <div class="card">
        <div class="card-header">Workflow Info</div>
        <div class="card-body" id="info-panel">
          <div class="empty-state">
            <div class="empty-icon">🔲</div>
            No workflow loaded yet.<br>Upload a JSON file to get started.
          </div>
        </div>
      </div>

      <div class="card" id="slots-card" style="display:none;">
        <div class="card-header">File Slots</div>
        <div class="card-body" id="slots-panel"></div>
      </div>

      <div id="run-btn-wrap" style="display:none;">
        <button class="btn-run" id="run-btn" onclick="runWorkflow()">▶ Run Workflow</button>
      </div>

      <div class="card" id="run-card" style="display:none;">
        <div class="card-header">Run Output</div>
        <div class="card-body" id="run-panel"></div>
      </div>

    </div>
  </div>

  <!-- API Keys Modal -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">API Keys</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="keys-panel"></div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('upload-area');
    const fileInput  = document.getElementById('file-input');
    const clearBtn   = document.getElementById('clear-btn');
    const statusEl   = document.getElementById('status');
    const infoPanel  = document.getElementById('info-panel');
    const slotsCard  = document.getElementById('slots-card');
    const slotsPanel = document.getElementById('slots-panel');

    // ── Helpers ──

    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = `status ${type}`;
    }

    function badgeFor(type) {
      return `<span class="badge badge-${type}">${type}</span>`;
    }

    // ── Workflow info ──

    function renderInfo(data) {
      const title = data.title || '(untitled)';
      const nodes = data.nodes.map(n => `
        <div class="node-row">
          ${badgeFor(n.type)}
          <span class="node-label">${n.label || '—'}</span>
          <span class="node-id">${n.id.slice(0, 10)}…</span>
        </div>
      `).join('');

      infoPanel.innerHTML = `
        <div class="wf-meta">
          <div class="wf-title">${title}</div>
          <div class="wf-detail">${data.node_count} nodes · ${data.mode || 'sequential'} mode</div>
        </div>
        <div class="section-label">Nodes</div>
        ${nodes}
      `;
      clearBtn.disabled = false;
      document.getElementById('run-btn-wrap').style.display = 'block';
    }

    function clearInfo() {
      infoPanel.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔲</div>
          No workflow loaded yet.<br>Upload a JSON file to get started.
        </div>
      `;
      clearBtn.disabled = true;
      slotsCard.style.display = 'none';
      document.getElementById('run-btn-wrap').style.display = 'none';
      document.getElementById('run-card').style.display = 'none';
    }

    async function loadInfo() {
      const res = await fetch('/workflow/info');
      if (!res.ok) { clearInfo(); return; }
      renderInfo(await res.json());
    }

    // ── Workflow upload ──

    async function uploadFile(file) {
      const text = await file.text();
      let json;
      try { json = JSON.parse(text); }
      catch { showStatus('Invalid JSON file.', 'error'); return; }

      const res = await fetch('/workflow/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(json),
      });

      if (!res.ok) {
        const err = await res.json();
        showStatus(err.detail || 'Upload failed.', 'error');
        return;
      }

      showStatus('Workflow uploaded successfully.', 'ok');
      loadInfo();
      loadSlots();
    }

    clearBtn.addEventListener('click', async () => {
      await fetch('/workflow/clear', { method: 'DELETE' });
      clearInfo();
      showStatus('Workflow cleared.', 'ok');
    });

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) uploadFile(file);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) uploadFile(fileInput.files[0]);
    });

    // ── File slots ──

    let _pollTimer = null;

    async function loadSlots() {
      const [slotsRes, filesRes] = await Promise.all([
        fetch('/workflow/slots'),
        fetch('/files'),
      ]);

      if (!slotsRes.ok) { slotsCard.style.display = 'none'; return; }

      const { slots }  = await slotsRes.json();
      const uploaded   = filesRes.ok ? await filesRes.json() : {};

      // fetch per-file index status for each slot
      // each result is { filename: { status, chunks, error? }, ... }
      const statusResults = await Promise.all(
        slots.map(s => fetch(`/files/status/${s.slot_id}`).then(r => r.ok ? r.json() : {}))
      );
      const indexStatuses = Object.fromEntries(
        slots.map((s, i) => [s.slot_id, statusResults[i]])
      );

      // poll if any individual file is still indexing
      const anyIndexing = Object.values(indexStatuses).some(fileMap =>
        Object.values(fileMap).some(s => s.status === 'indexing')
      );
      clearTimeout(_pollTimer);
      if (anyIndexing) _pollTimer = setTimeout(loadSlots, 2000);

      if (slots.length === 0) { slotsCard.style.display = 'none'; return; }

      slotsCard.style.display = 'block';

      // warn if OpenAI key is missing (needed for embedding)
      const keysRes = await fetch('/keys/status');
      const keyStatuses = keysRes.ok ? await keysRes.json() : {};
      const missingKeyWarning = !keyStatuses.openai ? `
        <div class="key-warning">
          ⚠ No OpenAI API key set. Files will upload but won't be indexed until you add a key via <strong>⚙ API Keys</strong>.
        </div>
      ` : '';
      slotsPanel.innerHTML = missingKeyWarning;

      slotsPanel.innerHTML += slots.map(slot => {
        const filenames = uploaded[slot.slot_id] || [];
        const fileStatuses = indexStatuses[slot.slot_id] || {};

        const fileList = filenames.length
          ? filenames.map(f => {
              const fs = fileStatuses[f] || {};
              const badge = fs.status === 'done'     ? '<span class="idx-badge idx-done">✓ indexed</span>'
                          : fs.status === 'indexing' ? '<span class="idx-badge idx-progress">⏳ indexing…</span>'
                          : fs.status === 'failed'   ? `<span class="idx-badge idx-fail" title="${fs.error || ''}">✗ failed</span>`
                          : '';
              return `
                <div class="slot-file uploaded">
                  📄 ${f} ${badge}
                  <button class="btn-remove-file" onclick="removeSlotFile('${slot.slot_id}', '${f}')" title="Remove">✕</button>
                </div>
              `;
            }).join('')
          : `<div class="slot-file">No files uploaded</div>`;

        const promptHint = slot.prompt
          ? `<div class="slot-prompt">"${slot.prompt}"</div>`
          : '';

        return `
          <div class="slot-row">
            <div class="slot-info">
              <div class="slot-label">${slot.label}</div>
              ${promptHint}
              ${fileList}
              <div style="display:flex;gap:4px;margin-top:4px;">
                ${slot.needs_content   ? '<span class="badge badge-content">content</span>'   : ''}
                ${slot.needs_embedding ? '<span class="badge badge-embed">embedding</span>'   : ''}
              </div>
            </div>
            <div class="slot-actions">
              <label class="btn-upload" style="cursor:pointer;">
                Upload
                <input type="file" style="display:none" multiple onchange="uploadSlotFile('${slot.slot_id}', this)" />
              </label>
            </div>
          </div>
        `;
      }).join('');
    }

    async function uploadSlotFile(slotId, input) {
      const files = Array.from(input.files);
      if (!files.length) return;

      // Upload each file sequentially and render after each one so the user
      // sees badges appear one by one rather than waiting for all to finish.
      for (const file of files) {
        const formData = new FormData();
        formData.append('file', file);
        await fetch(`/files/${slotId}`, { method: 'POST', body: formData });
        loadSlots();
      }
    }

    async function removeSlotFile(slotId, filename) {
      await fetch(`/files/${slotId}/${encodeURIComponent(filename)}`, { method: 'DELETE' });
      loadSlots();
    }

    // ── API Keys Modal ──

    const PROVIDERS = [
      { id: 'openai', label: 'OpenAI',  placeholder: 'sk-...' },
      { id: 'claude', label: 'Claude',  placeholder: 'sk-ant-...' },
      { id: 'gemini', label: 'Gemini',  placeholder: 'AI...' },
      { id: 'ollama', label: 'Ollama',  placeholder: 'http://localhost:11434' },
    ];

    function openModal() {
      document.getElementById('modal-backdrop').classList.add('open');
      loadKeys();
    }

    function closeModal() {
      document.getElementById('modal-backdrop').classList.remove('open');
    }

    document.getElementById('modal-backdrop').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    async function loadKeys() {
      const res = await fetch('/keys/status');
      if (!res.ok) return;
      renderKeys(await res.json());
    }

    function renderKeys(statuses) {
      document.getElementById('keys-panel').innerHTML = PROVIDERS.map(p => `
        <div class="key-row">
          <span class="key-provider">${p.label}</span>
          <span class="key-status ${statuses[p.id] ? 'set' : 'unset'}">
            ${statuses[p.id] ? '✓ set' : 'not set'}
          </span>
          <input class="key-input" id="key-${p.id}" type="password" placeholder="${statuses[p.id] ? '••••••••••••••••' : p.placeholder}" autocomplete="new-password" ${statuses[p.id] ? '' : 'readonly onfocus="this.removeAttribute(\'readonly\')"'} />
          <button class="btn-save-key" onclick="saveKey('${p.id}')">Save</button>
          ${statuses[p.id] ? `<button class="btn-remove-key" onclick="removeKey('${p.id}')">Remove</button>` : ''}
        </div>
      `).join('');
    }

    async function saveKey(provider) {
      const input = document.getElementById(`key-${provider}`);
      const value = input.value.trim();
      if (!value) return;
      const res = await fetch('/keys', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider, value }),
      });
      if (res.ok) { input.value = ''; loadKeys(); }
    }

    async function removeKey(provider) {
      await fetch(`/keys/${provider}`, { method: 'DELETE' });
      loadKeys();
    }

    // ── Workflow execution ──

    let _runPollTimer = null;

    async function runWorkflow() {
      const btn = document.getElementById('run-btn');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Running…'; }

      const runCard  = document.getElementById('run-card');
      const runPanel = document.getElementById('run-panel');
      runCard.style.display = 'block';
      runPanel.innerHTML = '<div class="run-status running">⏳ Starting workflow…</div>';

      const res = await fetch('/run', { method: 'POST' });
      if (!res.ok) {
        const err = await res.json();
        runPanel.innerHTML = `<div class="run-status failed">✗ ${err.detail || 'Failed to start run.'}</div>`;
        if (btn) { btn.disabled = false; btn.textContent = '▶ Run Workflow'; }
        return;
      }

      const { run_id } = await res.json();
      clearTimeout(_runPollTimer);
      _pollRun(run_id);
    }

    async function _pollRun(run_id) {
      const res = await fetch(`/run/${run_id}`);
      if (!res.ok) return;

      const run = await res.json();
      _renderRun(run);

      if (run.status === 'running') {
        _runPollTimer = setTimeout(() => _pollRun(run_id), 1500);
      } else {
        const btn = document.getElementById('run-btn');
        if (btn) { btn.disabled = false; btn.textContent = '▶ Run Workflow'; }
        // scroll to output
        document.getElementById('run-card').scrollIntoView({ behavior: 'smooth' });
      }
    }

    function _renderRun(run) {
      const runPanel = document.getElementById('run-panel');
      if (!runPanel) return;

      const statusLabel = run.status === 'running' ? '⏳ Running…'
                        : run.status === 'done'    ? '✓ Completed'
                        : `✗ Failed: ${run.error || 'unknown error'}`;
      const statusClass = run.status;

      // One block per step/router node — sorted by label (natural order: Step 1, Step 2…)
      const nodeBlocks = Object.values(run.node_outputs || {})
        .sort((a, b) => _naturalCmp(a.label, b.label))
        .map(n => `
          <div class="node-output">
            <div class="node-output-header">${n.label}</div>
            ${n.instruction ? `<div class="node-output-instruction">${_esc(n.instruction)}</div>` : ''}
            <div class="node-output-body">${_mdToHtml(n.output) || '<em style="opacity:.5">No output</em>'}</div>
          </div>
        `).join('');

      const finalBlock = run.final_output ? `
        <div class="final-output-label">Final Output</div>
        <div class="final-output-box">${_mdToHtml(run.final_output)}</div>
      ` : (run.status === 'done' ? '<p style="opacity:.5;font-size:.85rem;margin-top:1rem">No output was produced. Check the server logs for details.</p>' : '');

      runPanel.innerHTML = `
        <div class="run-status ${statusClass}">${statusLabel}</div>
        ${nodeBlocks}
        ${finalBlock}
      `;
    }

    // Natural sort comparator: "Step 2" < "Step 10"
    function _naturalCmp(a, b) {
      const parts = s => String(s).split(/(\d+)/).map((c, i) => i % 2 ? parseInt(c, 10) : c.toLowerCase());
      const pa = parts(a), pb = parts(b);
      for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
        const diff = (pa[i] ?? '') < (pb[i] ?? '') ? -1 : (pa[i] ?? '') > (pb[i] ?? '') ? 1 : 0;
        if (diff !== 0) return diff;
      }
      return 0;
    }

    function _esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Minimal markdown → HTML renderer (no CDN needed).
    // Handles headings, bold, italic, inline code, hr, and bullet lists.
    function _mdToHtml(raw) {
      if (!raw) return '';
      const lines = String(raw).split('\n');
      let html = '';
      let inUl = false;

      const inline = s => _esc(s)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,     '<em>$1</em>')
        .replace(/`(.+?)`/g,       '<code>$1</code>');

      const closeList = () => { if (inUl) { html += '</ul>'; inUl = false; } };

      for (const raw_line of lines) {
        const line = raw_line.trimEnd();

        if (/^#{4}\s/.test(line))      { closeList(); html += `<h4>${inline(line.replace(/^#{4}\s+/, ''))}</h4>`; continue; }
        if (/^#{3}\s/.test(line))      { closeList(); html += `<h3>${inline(line.replace(/^#{3}\s+/, ''))}</h3>`; continue; }
        if (/^#{2}\s/.test(line))      { closeList(); html += `<h2>${inline(line.replace(/^#{2}\s+/, ''))}</h2>`; continue; }
        if (/^#{1}\s/.test(line))      { closeList(); html += `<h2>${inline(line.replace(/^#{1}\s+/, ''))}</h2>`; continue; }
        if (/^---+$/.test(line))       { closeList(); html += '<hr>'; continue; }
        if (/^[-*]\s/.test(line))      { if (!inUl) { html += '<ul>'; inUl = true; } html += `<li>${inline(line.replace(/^[-*]\s+/, ''))}</li>`; continue; }
        if (line.trim() === '')        { closeList(); html += '<br>'; continue; }

        closeList();
        html += `<p>${inline(line)}</p>`;
      }

      closeList();
      return html;
    }

    // ── Init ──
    loadInfo();
    loadSlots();
  </script>

</body>
</html>
