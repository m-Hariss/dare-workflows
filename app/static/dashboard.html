<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dare Workflow Runner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:      #EE183C;
      --blue:     #023572;
      --gradient: linear-gradient(92deg, #EE183C, #023572);
      --bg:       #F4F6FA;
      --surface:  #FFFFFF;
      --text:     #0a0a0a;
      --muted:    #737373;
      --border:   #e5e5e5;
      --radius:   10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--gradient);
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -.01em;
    }
    .header-subtitle {
      font-size: .78rem;
      opacity: .75;
      margin-top: 2px;
    }

    /* ── Layout ── */
    .container {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }
    .card-body { padding: 18px; }

    /* ── Upload area ── */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--red);
      background: #fff5f6;
    }
    .upload-icon { font-size: 2rem; margin-bottom: 10px; }
    .upload-label {
      font-size: .88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .upload-hint {
      font-size: .75rem;
      color: var(--muted);
    }
    #file-input { display: none; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: .82rem;
      font-weight: 600;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: opacity .15s;
      font-family: inherit;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary {
      background: var(--gradient);
      color: #fff;
      border: none;
    }
    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid #f9a8b4;
    }
    .btn-danger:hover:not(:disabled) { background: #fff0f2; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    /* ── Status message ── */
    .status {
      margin-top: 12px;
      font-size: .8rem;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }
    .status.ok    { background: #dcfce7; color: #15803d; display: block; }
    .status.error { background: #fee2e2; color: var(--red); display: block; }

    /* ── Workflow info ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: .85rem;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    .wf-meta {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .wf-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .wf-detail {
      font-size: .78rem;
      color: var(--muted);
    }

    .nodes-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .node-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: .83rem;
    }
    .node-label { flex: 1; font-weight: 500; }
    .node-id {
      font-family: "SF Mono", ui-monospace, monospace;
      font-size: .7rem;
      color: var(--muted);
    }

    /* ── Keys section ── */
    .key-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .key-row:last-child { border-bottom: none; }
    .key-provider {
      width: 70px;
      font-size: .82rem;
      font-weight: 600;
      text-transform: capitalize;
    }
    .key-status {
      font-size: .75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      width: 60px;
      text-align: center;
    }
    .key-status.set   { background: #dcfce7; color: #15803d; }
    .key-status.unset { background: #f4f4f5; color: var(--muted); }
    .key-input {
      flex: 1;
      padding: 6px 10px;
      font-size: .8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: "SF Mono", ui-monospace, monospace;
      outline: none;
    }
    .key-input:focus { border-color: var(--red); }
    .btn-save {
      padding: 6px 12px;
      font-size: .78rem;
      font-weight: 600;
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-remove {
      padding: 6px 10px;
      font-size: .78rem;
      font-weight: 600;
      background: transparent;
      color: var(--red);
      border: 1px solid #f9a8b4;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-remove:hover { background: #fff0f2; }

    /* ── Node type badges ── */
    .badge {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .badge-start  { background: #dbeafe; color: #1d4ed8; }
    .badge-step   { background: #dcfce7; color: #15803d; }
    .badge-file   { background: #fef9c3; color: #a16207; }
    .badge-router { background: #f3e8ff; color: #7c3aed; }
    .badge-output { background: #f4f4f5; color: #52525b; }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="header-title">Dare Workflow Runner</div>
      <div class="header-subtitle">Upload and inspect your workflow</div>
    </div>
  </div>

  <!-- Keys section -->
  <div style="max-width:960px;margin:0 auto 0;padding:0 24px;">
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header">API Keys</div>
      <div class="card-body" id="keys-panel">
        <!-- rendered by JS -->
      </div>
    </div>
  </div>

  <div class="container">

    <!-- Left: Upload -->
    <div class="card">
      <div class="card-header">Workflow</div>
      <div class="card-body">

        <div class="upload-area" id="upload-area">
          <div class="upload-icon">📂</div>
          <div class="upload-label">Drop your workflow JSON here</div>
          <div class="upload-hint">or click to browse</div>
          <input type="file" id="file-input" accept=".json,.dare" />
        </div>

        <div class="btn-row">
          <button class="btn btn-danger" id="clear-btn" disabled>Clear</button>
        </div>

        <div class="status" id="status"></div>

      </div>
    </div>

    <!-- Right: Workflow info -->
    <div class="card">
      <div class="card-header">Workflow Info</div>
      <div class="card-body" id="info-panel">
        <div class="empty-state">
          <div class="empty-icon">🔲</div>
          No workflow loaded yet.<br>Upload a JSON file to get started.
        </div>
      </div>
    </div>

  </div>

  <script>
    const uploadArea = document.getElementById('upload-area');
    const fileInput  = document.getElementById('file-input');
    const clearBtn   = document.getElementById('clear-btn');
    const statusEl   = document.getElementById('status');
    const infoPanel  = document.getElementById('info-panel');

    // ── Helpers ──

    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = `status ${type}`;
    }

    function badgeFor(type) {
      return `<span class="badge badge-${type}">${type}</span>`;
    }

    function renderInfo(data) {
      const title = data.title || '(untitled)';
      const nodes = data.nodes.map(n => `
        <div class="node-row">
          ${badgeFor(n.type)}
          <span class="node-label">${n.label || '—'}</span>
          <span class="node-id">${n.id.slice(0, 10)}…</span>
        </div>
      `).join('');

      infoPanel.innerHTML = `
        <div class="wf-meta">
          <div class="wf-title">${title}</div>
          <div class="wf-detail">${data.node_count} nodes · ${data.mode || 'sequential'} mode</div>
        </div>
        <div class="nodes-label">Nodes</div>
        ${nodes}
      `;
      clearBtn.disabled = false;
    }

    function clearInfo() {
      infoPanel.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔲</div>
          No workflow loaded yet.<br>Upload a JSON file to get started.
        </div>
      `;
      clearBtn.disabled = true;
    }

    // ── Upload ──

    async function uploadFile(file) {
      const text = await file.text();
      let json;
      try {
        json = JSON.parse(text);
      } catch {
        showStatus('Invalid JSON file.', 'error');
        return;
      }

      const res = await fetch('/workflow/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(json),
      });

      if (!res.ok) {
        const err = await res.json();
        showStatus(err.detail || 'Upload failed.', 'error');
        return;
      }

      showStatus('Workflow uploaded successfully.', 'ok');
      loadInfo();
    }

    // ── Load info on page load ──

    async function loadInfo() {
      const res = await fetch('/workflow/info');
      if (!res.ok) { clearInfo(); return; }
      const data = await res.json();
      renderInfo(data);
    }

    // ── Clear ──

    clearBtn.addEventListener('click', async () => {
      await fetch('/workflow/clear', { method: 'DELETE' });
      clearInfo();
      showStatus('Workflow cleared.', 'ok');
    });

    // ── Drag and drop ──

    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', e => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) uploadFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) uploadFile(fileInput.files[0]);
    });

    // ── Keys ──

    const PROVIDERS = [
      { id: 'openai',  label: 'OpenAI',  placeholder: 'sk-...' },
      { id: 'claude',  label: 'Claude',  placeholder: 'sk-ant-...' },
      { id: 'gemini',  label: 'Gemini',  placeholder: 'AI...' },
      { id: 'ollama',  label: 'Ollama',  placeholder: 'http://localhost:11434' },
    ];

    async function loadKeys() {
      const res = await fetch('/keys/status');
      if (!res.ok) return;
      const statuses = await res.json();
      renderKeys(statuses);
    }

    function renderKeys(statuses) {
      const keysPanel = document.getElementById('keys-panel');
      keysPanel.innerHTML = PROVIDERS.map(p => `
        <div class="key-row">
          <span class="key-provider">${p.label}</span>
          <span class="key-status ${statuses[p.id] ? 'set' : 'unset'}">
            ${statuses[p.id] ? '✓ set' : 'not set'}
          </span>
          <input class="key-input" id="key-${p.id}" type="password" placeholder="${p.placeholder}" />
          <button class="btn-save" onclick="saveKey('${p.id}')">Save</button>
          ${statuses[p.id] ? `<button class="btn-remove" onclick="removeKey('${p.id}')">Remove</button>` : ''}
        </div>
      `).join('');
    }

    async function saveKey(provider) {
      const input = document.getElementById(`key-${provider}`);
      const value = input.value.trim();
      if (!value) return;

      const res = await fetch('/keys', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider, value }),
      });

      if (res.ok) {
        input.value = '';
        loadKeys();
      }
    }

    async function removeKey(provider) {
      await fetch(`/keys/${provider}`, { method: 'DELETE' });
      loadKeys();
    }

    // ── Init ──
    loadInfo();
    loadKeys();
  </script>

</body>
</html>
